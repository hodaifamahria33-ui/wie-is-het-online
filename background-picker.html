<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kies achtergrond — Wie Is Het</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0a0612;
      color: #f8fafc;
      padding: 24px 16px 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: clamp(1.4rem, 4vw, 2rem);
    }
    p.sub {
      text-align: center;
      color: rgba(226, 232, 240, 0.75);
      margin-bottom: 28px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .opt {
      border: 2px solid rgba(251, 191, 36, 0.25);
      border-radius: 18px;
      overflow: hidden;
      background: #12082a;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .opt:hover {
      border-color: rgba(251, 191, 36, 0.7);
      transform: translateY(-3px);
    }
    .opt img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #07040f;
    }
    .opt figcaption {
      padding: 14px 16px 16px;
    }
    .opt strong {
      display: block;
      color: #fde68a;
      font-size: 1.05rem;
      margin-bottom: 6px;
    }
    .opt span {
      display: block;
      font-size: 0.9rem;
      color: rgba(226, 232, 240, 0.8);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <h1>Kies je achtergrond</h1>
  <p class="sub">Nieuwe opties — zeg welke je wilt (1, 2, 3 of 4). Dan zet ik hem live op het startscherm.</p>
  <div class="grid">
    <figure class="opt">
      <img src="assets/game/backgrounds/bg-new-1-violet-neon.svg" alt="Optie 1 Violet Neon" />
      <figcaption>
        <strong>Optie 1 — Violet Neon</strong>
        <span>Paars met gouden ring — gaming arena, clean en modern.</span>
      </figcaption>
    </figure>
    <figure class="opt">
      <img src="assets/game/backgrounds/bg-new-2-sunset-glow.svg" alt="Optie 2 Sunset Glow" />
      <figcaption>
        <strong>Optie 2 — Sunset Glow</strong>
        <span>Oranje/roze zonsondergang — warm en energiek.</span>
      </figcaption>
    </figure>
    <figure class="opt">
      <img src="assets/game/backgrounds/bg-new-3-midnight-grid.svg" alt="Optie 3 Midnight Grid" />
      <figcaption>
        <strong>Optie 3 — Midnight Grid</strong>
        <span>Donkerblauw met cyber grid — futuristisch.</span>
      </figcaption>
    </figure>
    <figure class="opt">
      <img src="assets/game/backgrounds/bg-new-4-royal-gold.svg" alt="Optie 4 Royal Gold" />
      <figcaption>
        <strong>Optie 4 — Royal Gold</strong>
        <span>Paars gordijn + goud spotlight — premium show-sfeer.</span>
      </figcaption>
    </figure>
  </div>
</body>
</html>
